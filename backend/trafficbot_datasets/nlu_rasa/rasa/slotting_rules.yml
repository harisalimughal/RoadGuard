version: '3.1'
rules:
- rule: Start report incident form
  steps:
  - intent: report_incident
  - action: report_incident_form
  - active_loop: report_incident_form
- rule: Submit report incident form
  condition:
  - active_loop: report_incident_form
  steps:
  - action: report_incident_form
  - active_loop: null
  - action: action_save_incident
  - action: utter_confirm
- rule: Start SOS form
  steps:
  - intent: sos_help
  - action: sos_form
  - active_loop: sos_form
- rule: Submit SOS form
  condition:
  - active_loop: sos_form
  steps:
  - action: sos_form
  - active_loop: null
  - action: action_lookup_contact
